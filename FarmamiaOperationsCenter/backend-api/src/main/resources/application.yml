spring:
  application:
    name: centro-operaciones-farmamia-api
  datasource:
    url: ${FARMAMIA_DB_URL:jdbc:postgresql://localhost:5432/farmamia_ops}
    username: ${FARMAMIA_DB_USER:postgres}
    password: ${FARMAMIA_DB_PASSWORD:.r4e3w2q1}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      seed-demo-admin: ${FARMAMIA_SEED_DEMO_ADMIN:true}

server:
  port: ${FARMAMIA_API_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

farmamia:
  agent:
    token-header-prefix: Bearer
  security:
    jwt-secret: ${FARMAMIA_JWT_SECRET:dev-secret-change-me}
    jwt-expiration-minutes: ${FARMAMIA_JWT_EXPIRATION_MINUTES:480}
    cors-allowed-origins: ${FARMAMIA_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  paquetes:
    ruta-almacenamiento: ${FARMAMIA_PACKAGE_STORAGE:./data/packages}
  orchestration:
    instruction-lease-minutes: ${FARMAMIA_ORCHESTRATION_INSTRUCTION_LEASE_MINUTES:15}
    scheduler:
      enabled: ${FARMAMIA_ORCHESTRATION_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${FARMAMIA_ORCHESTRATION_SCHEDULER_DELAY_MS:60000}
  retention:
    enabled: ${FARMAMIA_RETENTION_ENABLED:true}
    cron: ${FARMAMIA_RETENTION_CRON:0 20 2 * * *}
    events-days: ${FARMAMIA_RETENTION_EVENTS_DAYS:90}
    metrics-days: ${FARMAMIA_RETENTION_METRICS_DAYS:30}
    audit-days: ${FARMAMIA_RETENTION_AUDIT_DAYS:365}
