<section class="vista noc-vista">

  <header class="noc-cabecera">
    <div>
      <p class="etiqueta">Dashboard NOC — actualiza cada 30 s</p>
      <p class="noc-timestamp" *ngIf="resumen">
        Ultima lectura: {{ resumen.generatedAt | date:'HH:mm:ss' }}
      </p>
    </div>
    <div class="noc-acciones">
      <span class="indicador-error" *ngIf="error">Sin conexion con el backend</span>
      <span class="indicador-carga" *ngIf="cargando && !resumen">Cargando...</span>
      <a *ngIf="grafanaUrl" [href]="grafanaUrl" target="_blank" rel="noopener" class="boton secundario boton-grafana">
        Abrir Grafana
      </a>
    </div>
  </header>

  <ng-container *ngIf="resumen">

    <!-- Zona 1: Farmacias criticas / turno en riesgo -->
    <app-noc-zona-critico
      [farmaciasCriticas]="resumen.criticFarms"
      [farmaciasDeTurnoEnRiesgo]="resumen.atRiskFarms">
    </app-noc-zona-critico>

    <!-- Zona 2 + 3 + 4 en fila -->
    <div class="noc-fila-metricas" [class.sin-campana]="!resumen.activeCampaign">
      <app-noc-zona-red [red]="resumen.network"></app-noc-zona-red>
      <app-noc-zona-pos [pos]="resumen.pos"></app-noc-zona-pos>
      <app-noc-zona-campana [campana]="resumen.activeCampaign"></app-noc-zona-campana>
    </div>

    <!-- Zona 5: Alertas recientes -->
    <app-noc-zona-alertas [alertas]="resumen.recentAlerts"></app-noc-zona-alertas>

  </ng-container>

  <div class="noc-sin-datos" *ngIf="!resumen && !cargando">
    <p>Sin datos disponibles. Verifica la conexion con el backend.</p>
  </div>

</section>
